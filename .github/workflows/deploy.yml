name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Create .env file with secrets
        working-directory: ./app
        run: |
          echo "VITE_HF_API_KEY=${{ secrets.HF_API_KEY }}" > .env
          echo "VITE_HF_MODEL=google/flan-t5-base" >> .env
          echo "VITE_API_URL=http://localhost:5000/api" >> .env

      - name: Build the app
        working-directory: ./app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './app/dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./dist-artifact

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and deploy
        run: |
          set -e
          echo "Current directory: $(pwd)"
          echo "Contents of dist-artifact:"
          ls -la dist-artifact/ || echo "dist-artifact directory not found"
          
          cd dist-artifact
          echo "Extracting tar file..."
          tar -xzf artifact.tar
          echo "Tar extraction complete"
          echo "Contents after extraction:"
          ls -la
          
          cd ..
          echo "Removing old files..."
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d ! -name . ! -name dist-artifact -exec rm -rf {} + 2>/dev/null || true
          
          echo "Moving new files..."
          mv dist-artifact/* .
          rm -rf dist-artifact
          echo "Deploy extraction complete"
          echo "Final directory contents:"
          ls -la

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy to GitHub Pages"
            git push origin gh-pages
          fi
